<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts,TWE and Tailwind CSS Setup -->
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700,900&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tw-elements/css/tw-elements.min.css" />
    <script src="https://cdn.tailwindcss.com/3.3.0"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          fontFamily: {
            sans: ["Roboto", "sans-serif"],
            body: ["Roboto", "sans-serif"],
            mono: ["ui-monospace", "monospace"],
          },
        },
        corePlugins: {
          preflight: false,
        },
      };
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/tw-elements/js/tw-elements.umd.min.js"
      defer></script>
    <script src="profile-script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <title>NovusNet | Security Profile</title>
  </head>
  <body
    class="bg-slate-900 flex flex-col min-h-screen text-slate-100 font-sans antialiased">
    <!-- SINGLE UNIFIED NAVBAR (UNIFORM WITH ORBIT WALL & FEED) -->
    <header
      class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
      <nav
        class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">
        <!-- Logo -->
        <div class="flex items-center gap-6">
          <a
            class="text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400"
            href="index.html">
            NOVUS
          </a>
          <!-- Navigation Menu Links -->
          <ul class="flex space-x-4 list-none m-0 p-0 text-sm font-medium">
            <li>
              <a
                href="feed.html"
                class="text-slate-400 hover:text-blue-400 transition"
                >Feed</a
              >
            </li>
            <li>
              <a
                href="profile.html"
                class="text-blue-400 font-semibold transition"
                >Profile</a
              >
            </li>
            <li>
              <a
                href="orbit-stream-wall.html"
                class="text-slate-400 hover:text-blue-400 transition"
                >Orbit Wall</a
              >
            </li>
          </ul>
        </div>

        <!-- User Session Indicator & Logout Button -->
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2">
            <span
              class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <!-- Fallback text while storage maps -->
            <span
              id="display-name-nav"
              class="font-medium text-sm text-slate-300"
              >Explorer</span
            >
          </div>

          <button
            id="logout-btn"
            class="px-3 py-1.5 bg-red-500/20 hover:bg-red-500 border border-red-500/30 text-red-200 hover:text-white rounded-xl text-xs font-semibold transition duration-200">
            Log out
          </button>
        </div>
      </nav>
    </header>

    <main
      class="flex-grow container mx-auto p-6 max-w-xl flex items-center justify-center">
      <!-- Unified Translucent Slate Card from TWE -->
      <div
        id="profile-card"
        class="w-full bg-slate-800/50 border border-slate-800 rounded-3xl p-8 shadow-2xl text-center space-y-6 backdrop-blur-sm">
        <!-- Graphic Avatar Terminal Accent "Logo" NV TWE idea -->
        <div
          class="mx-auto w-20 h-20 rounded-2xl bg-gradient-to-tr from-blue-500 to-emerald-500 flex items-center justify-center text-slate-950 font-black text-2xl shadow-lg shadow-blue-500/10">
          NV
        </div>

        <!-- Content Hook Targets from script.js Object Model -->
        <div class="space-y-2">
          <h2
            id="display-name"
            class="text-3xl font-extrabold text-slate-100 tracking-tight">
            Connecting Profile...
          </h2>
          <p
            id="display-role"
            class="text-xs font-bold text-blue-400 tracking-widest uppercase"></p>
        </div>

        <div class="border-t border-slate-800 my-4"></div>

        <p
          id="display-bio"
          class="text-sm text-slate-300 leading-relaxed italic bg-slate-900/40 p-4 rounded-xl border border-slate-800/50"></p>

        <div class="pt-2">
          <button
            id="logout-btn"
            type="button"
            class="w-full sm:w-auto px-6 py-2.5 bg-gradient-to-r from-red-500/20 to-pink-500/20 hover:from-red-600 hover:to-pink-600 border border-red-500/40 hover:border-transparent text-red-200 hover:text-white rounded-xl text-xs font-bold uppercase tracking-wider transition duration-200 shadow-lg">
            Logout
          </button>
        </div>
      </div>
    </main>

    <footer
      class="border-t border-slate-800 bg-slate-900/40 py-6 text-center text-xs text-slate-500 font-mono">
      <div
        class="flex flex-row justify-around gap-6 text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
        NOVUS
      </div>
      <p>&copy; 2026 Pearla Mutumbo | Authentic Social Network | Novus</p>
    </footer>
  </body>
</html>
