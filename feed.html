<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <!-- Tailwind and TW elements script and CDN -->
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700,900&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tw-elements/css/tw-elements.min.css" />
    <script src="https://cdn.tailwindcss.com/3.3.0"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          fontFamily: {
            sans: ["Roboto", "sans-serif"],
            body: ["Roboto", "sans-serif"],
            mono: ["ui-monospace", "monospace"],
          },
        },
        corePlugins: {
          preflight: false,
        },
      };
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/tw-elements/js/tw-elements.umd.min.js"
      defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js" defer></script>
    <title>NovusNet | Community Feed</title>
  </head>
  <body class="bg-slate-900 flex flex-col min-h-screen">
    <header>
      <!-- TW elements in the navbar to make it pop -->
      <nav
        class="flex-no-wrap relative flex w-full items-center justify-between bg-white py-4 shadow-md lg:flex-wrap lg:justify-start">
        <div class="flex w-full flex-wrap items-center justify-between px-6">
          <div class="flex items-center">
            <a
              class="text-xl font-bold text-blue-600"
              href="index-discover.html"
              >Novus</a
            >
          </div>
          <ul class="flex list-style-none mr-auto pl-4">
            <li class="px-2">
              <a href="index-discover.html" class="text-blue-500">Portal</a>
            </li>
            <li class="px-2">
              <a href="feed.html" class="text-gray-500 hover:text-blue-500"
                >Feed</a
              >
            </li>
            <li class="px-2">
              <a href="profile.html" class="text-gray-500 hover:text-bue-500"
                >Profile</a
              >
            </li>
            <li class="px-2">
              <a
                href="orbit-stream-wall.html"
                class="text-gray-500 hover:text-bue-500"
                >Orbit Wall</a
              >
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main class="flex-grow container mx-auto p-4 max-w-4xl">
      <section id="feed-section"></section>
      <section>
        <form id="form-2">
          <label for="topic">Topic to explore</label>
          <input
            id="topic"
            name="topic"
            type="text"
            placeholder="e.g. space, AI, art..." />
          <button type="submit">Pulse the Network</button>
        </form>
        <div id="error"></div>
        <div id="success"></div>
        <div id="result"></div>
      </section>
    </main>
    <footer class="big-white p-6 text-center border-t">
      <div
        class="flex flex-row justify-around gap-6 mt-3 text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
        NOVUS
      </div>
      <p>@ 2026 Pearla Mutombo | Authentic Social Computing | Novus</p>
      
    </footer>
  </body>
</html>
