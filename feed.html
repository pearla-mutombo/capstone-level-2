<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <!-- Fonts, TWE and Tailwind CSS Setup -->
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700,900&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tw-elements/css/tw-elements.min.css" />
    <script src="https://cdn.tailwindcss.com/3.3.0"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          fontFamily: {
            sans: ["Roboto", "sans-serif"],
            body: ["Roboto", "sans-serif"],
            mono: ["ui-monospace", "monospace"],
          },
        },
        corePlugins: {
          preflight: false,
        },
      };
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/tw-elements/js/tw-elements.umd.min.js"
      defer></script>
    <script src="feed-script.js" defer></script>
    <title>NovusNet | Community Feed</title>
  </head>
  <body
    class="bg-slate-900 flex flex-col min-h-screen text-slate-100 font-sans antialiased">
    <!-- SINGLE UNIFIED NAVBAR (Uniform with Orbit Wall) -->
    <header
      class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
      <nav
        class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">
        <!-- Logo -->
        <div class="flex items-center gap-6">
          <a
            class="text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400"
            href="index.html">
            NOVUS
          </a>
          <!-- Navigation Menu Links -->
          <ul class="flex space-x-4 list-none m-0 p-0 text-sm font-medium">
            <li>
              <a href="feed.html" class="text-blue-400 font-semibold transition"
                >Feed</a
              >
            </li>
            <li>
              <a
                href="profile.html"
                class="text-slate-400 hover:text-blue-400 transition"
                >Profile</a
              >
            </li>
            <li>
              <a
                href="orbit-stream-wall.html"
                class="text-slate-400 hover:text-blue-400 transition"
                >Orbit Wall</a
              >
            </li>
          </ul>
        </div>

        <!-- User Session Indicator & Logout Button -->
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2">
            <span
              class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <!-- Hidden by default, my script or central router can inject active user data here if needed -->
            <span id="display-name" class="font-medium text-sm text-slate-300"
              >Explorer</span
            >
          </div>
          <button
            id="logout-btn"
            class="px-3 py-1.5 bg-red-500/20 hover:bg-red-500 border border-red-500/30 text-red-200 hover:text-white rounded-xl text-xs font-semibold transition duration-200">
            Log out
          </button>
        </div>
      </nav>
    </header>

    <!-- MAIN DASHBOARD CONTENT AREA -->
    <main class="flex-grow container mx-auto p-6 max-w-4xl space-y-8">
      <!-- Public Posts Feed List -->
      <section id="feed-section" class="space-y-4">
        <p class="text-center text-xs text-slate-500 py-6">
          Connecting orbit stream grid...
        </p>
      </section>

      <!-- API Explorer Form Box -->
      <section
        class="bg-slate-800/50 border border-slate-800 rounded-2xl p-6 mt-8">
        <h2 class="text-lg font-bold text-slate-100 mb-2">
          🚀 Quantum Network Pulse
        </h2>
        <p class="text-xs text-slate-400 mb-4">
          Query live parallel data repositories across science, world news,
          arts, nasa and other digital archives.
        </p>

        <form id="form-2" class="flex flex-col sm:flex-row gap-3">
          <div class="flex-grow">
            <label for="topic" class="sr-only">Topic to explore</label>
            <input
              id="topic"
              name="topic"
              type="text"
              class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500"
              placeholder="Search the database... (e.g. space, AI, art)" 
              />
          </div>
          <button type="submit" class="bg-gradient-to-r from-blue-500 to-emerald-500 hover:from-blue-600 hover:to-emerald-600 text-slate-950 font-bold px-5 py-3 rounded-xl text-sm transition duration-200 whitespace-nowrap">
            Pulse Network
          </button>
        </form>

        <div id="error" class="mt-4"></div>
        <div id="success" class="mt-4"></div>
        <div id="result" class="mt-4"></div>
      </section>
    </main>

    <footer
      class="border-t border-slate-800 bg-slate-900/40 py-6 text-center text-xs text-slate-500 font-mono">
      <div
        class="flex flex-row justify-around gap-6 text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
        NOVUS
      </div>
      <p>&copy; 2026 Pearla Mutombo | Authentic Social Network | Novus</p>
    </footer>
  </body>
</html>
