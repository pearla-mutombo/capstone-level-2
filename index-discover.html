<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tailwind and TW elements script and CDN -->
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700,900&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tw-elements/css/tw-elements.min.css" />
    <script src="https://cdn.tailwindcss.com/3.3.0"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          fontFamily: {
            sans: ["Roboto", "sans-serif"],
            body: ["Roboto", "sans-serif"],
            mono: ["ui-monospace", "monospace"],
          },
        },
        corePlugins: {
          preflight: false,
        },
      };
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/tw-elements/js/tw-elements.umd.min.js"
      defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>NovusNet | Web Storage</title>
  </head>
  <body class="bg-slate-900 flex flex-col min-h-screen">
    <header>
      <!-- TW elements in the navbar to make it pop -->
      <nav
        class="flex-no-wrap relative flex w-full items-center justify-between bg-white py-4 shadow-md lg:flex-wrap lg:justify-start">
        <div class="flex w-full flex-wrap items-center justify-between px-6">
          <div class="flex items-center">
            <a
              class="text-xl font-bold text-blue-600 sm:text-green-400 md:text-cyan-800 lg:text-purple-500 xl:text-cyan-400"
              href="index.html"
              >Novus</a
            >
          </div>
          <ul class="flex list-style-none mr-auto pl-4">
            <li class="px-2">
              <a href="index-discover.html" class="text-blue-500">Portal</a>
            </li>
            <li class="px-2">
              <a href="feed.html" class="text-gray-500 hover:text-blue-500"
                >Feed</a
              >
            </li>
            <li class="px-2">
              <a href="profile.html" class="text-gray-500 hover:text-bue-500"
                >Profile</a
              >
            </li>
            <li class="px-2">
              <a
                href="orbit-stream-wall.html"
                class="text-gray-500 hover:text-bue-500">
                Orbit Wall</a
              >
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main
      class="container mx-auto p-6 max-w-lg bg-white mt-10 rounded-lg shadow-xl">
      <h2 class="text-2xl font-bold mb-4">Post a Moment</h2>

      <form id="discovery-from" class="space-y-4">
        <fieldset class="border p-4 rounded">
          <legend class="font-bold px-2">Community Content</legend>
        <div>
        <label for="username" class="block font-medium mb-1" placeholder="username">Username</label>
        <texarea id="username" placeholder="Username"></texarea>
       <input id="username" name="username" type="text" class="w-full border rounded p-2 focus:ring-2 focus-blue-400 placeholder-slate-500" required />
       </div>
       <div>
        <label for="password" class="block font-medium mb-1" placeholder="password">Password</label>
        <texarea id="password" placeholder="password"></texarea>
       <input id="password" name="password" type="text" class="w-full border rounded p-2 focus:ring-2 focus-blue-400 placeholder-slate-500" required />
       </div>
       
       </div>
       <div>
    <label for="novus-select" class="block font-medium mb-1">Primary Domain</label>
    <select id="novus-select" name="domain" class="w-full border rounded p-2">
      <option value="computing">Advanced Computing</option>
      <option value="news">World News</option>
      <option value="arts">Arts</option>
      <option value="science">Science</option>
     <option value="law">Global Jurisprudence</option>
    </select>
    </div>
    </fieldset>
        <!-- place for radio buttons -->
        <div class="flex gap-4">
          <div class="mb-[0.125rem] block min-h-[1.5rem] ps-[1.5rem]">
            <input
              class="relative float-left -ms-[1.5rem] me-1 mt-0.5 h-5 w-5 appearance-none rounded-full border-2 border-solid border-secondary-500 before:pointer-events-none before:absolute before:h-4 before:w-4 before:scale-0 before:rounded-full before:bg-transparent before:opacity-0 before:shadow-checkbox before:shadow-transparent before:content-[''] after:absolute after:z-[1] after:block after:h-4 after:w-4 after:rounded-full after:content-[''] checked:border-primary checked:before:opacity-[0.16] checked:after:absolute checked:after:left-1/2 checked:after:top-1/2 checked:after:h-[0.625rem] checked:after:w-[0.625rem] checked:after:rounded-full checked:after:border-primary checked:after:bg-primary checked:after:content-[''] checked:after:[transform:translate(-50%,-50%)] hover:cursor-pointer hover:before:opacity-[0.04] hover:before:shadow-black/60 focus:shadow-none focus:outline-none focus:ring-0 focus:before:scale-100 focus:before:opacity-[0.12] focus:before:shadow-black/60 focus:before:transition-[box-shadow_0.2s,transform_0.2s] checked:focus:border-primary checked:focus:before:scale-100 checked:focus:before:shadow-checkbox checked:focus:before:transition-[box-shadow_0.2s,transform_0.2s] rtl:float-right dark:border-neutral-400 dark:checked:border-primary"
              type="radio"
              name="flexRadioDefault"
              id="visibility"
              value="public"
              checked />
            <label
              class="mt-px inline-block ps-[0.15rem] hover:cursor-pointer"
              for="visibility">
              Public
            </label>
          </div>
          <div class="mb-[0.125rem] block min-h-[1.5rem] ps-[1.5rem]">
            <input
              class="relative float-left -ms-[1.5rem] me-1 mt-0.5 h-5 w-5 appearance-none rounded-full border-2 border-solid border-secondary-500 before:pointer-events-none before:absolute before:h-4 before:w-4 before:scale-0 before:rounded-full before:bg-transparent before:opacity-0 before:shadow-checkbox before:shadow-transparent before:content-[''] after:absolute after:z-[1] after:block after:h-4 after:w-4 after:rounded-full after:content-[''] checked:border-primary checked:before:opacity-[0.16] checked:after:absolute checked:after:left-1/2 checked:after:top-1/2 checked:after:h-[0.625rem] checked:after:w-[0.625rem] checked:after:rounded-full checked:after:border-primary checked:after:bg-primary checked:after:content-[''] checked:after:[transform:translate(-50%,-50%)] hover:cursor-pointer hover:before:opacity-[0.04] hover:before:shadow-black/60 focus:shadow-none focus:outline-none focus:ring-0 focus:before:scale-100 focus:before:opacity-[0.12] focus:before:shadow-black/60 focus:before:transition-[box-shadow_0.2s,transform_0.2s] checked:focus:border-primary checked:focus:before:scale-100 checked:focus:before:shadow-checkbox checked:focus:before:transition-[box-shadow_0.2s,transform_0.2s] rtl:float-right dark:border-neutral-400 dark:checked:border-primary"
              type="radio"
              name="flexRadioDefault"
              id="visibility"
              value="private" />
            <label
              class="mt-px inline-block ps-[0.15rem] hover:cursor-pointer"
              for="visibility">
              Private
            </label>
          </div>
        </div>
        <!-- place login buttons -->
        <button
          type="button"
          data-twe-ripple-init
          data-twe-ripple-color="light"
          class="inline-block rounded bg-blue-600 px-6 py-2.5 text-white"
          id="loginBtn"
          value="loginBtn">
          Log in
        </button>
        <button
          type="button"
          data-twe-ripple-init
          data-twe-ripple-color="light"
          class="inline-block rounded bg-gray-400 px-6 py-2.5 text-gray-600"
          id="createBtn"
          value="createBtn">
          Create Account
        </button>
        <button
          type="button"
          data-twe-ripple-init
          data-twe-ripple-color="light"
          class="inline-block rounded bg-blue-600 px-6 py-2.5 text-black border-solid border-black"
          id="forgotBtn"
          value="forgotBtn">
          Forgot Passowrd?
        </button>
        
          </div>
        </form>
      </div>

    </main>

    <footer class="border-t border-slate-800 bg-slate-900/40 py-6 text-center text-xs text-slate-500 font-mono">
      <div class="flex flex-row justify-around gap-6 text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
        NOVUS
      </div>
      <p>&copy; 2026 Pearla Mutumbo | Authentic Social Network | Novus</p>
    </footer>

  </body>
</html>
